[agent]
  interval = "5s"
  flush_interval = "5s"

[[outputs.http]]
  url = "http://telegraf-bridge:8080"
  method = "POST"
  data_format = "json"
  [outputs.http.headers]
    Content-Type = "application/json"

# -------------------------------------------------------------------
# INPUTS
# -------------------------------------------------------------------
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  fieldpass = ["usage_user", "usage_system", "usage_idle", "usage_iowait"]

[[inputs.diskio]]
  devices = ["nvme0n1"]
  fieldpass = ["io_time", "iops_in_progress", "read_bytes", "reads", "write_bytes", "writes"]

[[inputs.mem]]
  fieldpass = ["used", "available", "total"]
  
[[inputs.processes]]
  fieldpass = ["blocked", "running", "zombies", "idle", "sleeping", "stopped", "total", "total_threads"]

[[inputs.system]]
  fieldpass = ["load1", "load15", "load5", "n_cpus", "uptime"]

