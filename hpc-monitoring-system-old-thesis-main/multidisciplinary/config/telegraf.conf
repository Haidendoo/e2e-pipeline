[agent]
  interval = "5s"
  flush_interval = "5s"

[[outputs.http]]
  url = "http://localhost:8085"
  method = "POST"
  data_format = "json"
  [outputs.http.headers]
    Content-Type = "application/json"

# -------------------------------------------------------------------
# INPUTS (Phiên bản chạy trực tiếp trên WSL Linux)
# -------------------------------------------------------------------
[[inputs.cpu]]
  totalcpu = true

[[inputs.mem]]

[[inputs.diskio]]
  # Quét toàn bộ ổ cứng Linux (WSL)

[[inputs.system]]

[[inputs.net]]

# Lấy thông số GPU NVIDIA (WSL hỗ trợ gọi lệnh nvidia-smi)
[[inputs.nvidia_smi]]
  fieldpass = ["temperature_gpu", "utilization_gpu", "utilization_memory", "memory_used", "memory_free", "memory_reserved", "memory_total", "fan_speed"]

# Bỏ phần pmon vì WSL không hỗ trợ lệnh này (bị treo timeout)
# [[inputs.exec]]
#   commands = ["bash -c 'nvidia-smi pmon -c 1 -s u | awk \"NR>2 {print \\$1, \\$2, \\$4, \\$5}\"'"]
#   name_override = "gpu_process_metrics"
#   data_format = "csv"
#   csv_delimiter = " "
#   csv_column_names = ["gpu_idx", "pid", "sm_util", "mem_util"]
#   csv_tag_columns = ["gpu_idx", "pid"]

[[inputs.exec]]
  commands = ["nvidia-smi --query-compute-apps=pid,process_name,used_memory --format=csv,noheader,nounits"]
  name_override = "gpu_process_metrics"
  data_format = "csv"
  csv_column_names = ["pid", "process_name", "used_memory"]
  csv_tag_columns = ["pid", "process_name"]

# Bỏ tcp_top vì cần cấu hình kernel eBPF đặc biệt mà WSL không có sẵn
# [[inputs.exec]]
#   commands = ["sudo /usr/bin/python3 /opt/telegraf-scripts/tcptop.py 5 1"]
#   name_override = "tcp_top"
#   data_format = "influx"

# -------------------------------------------------------------------
# PROCESSORS & AGGREGATORS
# -------------------------------------------------------------------
[[processors.rename]]
  namepass = ["mem"]
  [[processors.rename.replace]]
    field = "total"
    dest = "mem_total"

[[processors.rename]]
  namepass = ["processes"]
  [[processors.rename.replace]]
    field = "total"
    dest = "proc_total"

[[processors.converter]]
  namepass = ["gpu_process_metrics"]
  [processors.converter.tags]
    string = ["gpu_idx", "pid", "process_name"]

[[aggregators.merge]]
  drop_original = true