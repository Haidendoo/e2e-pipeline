# -------------------------------------------------------------------
# PROCESSORS & AGGREGATORS
# -------------------------------------------------------------------
[[processors.rename]]
  namepass = ["mem"]
  [[processors.rename.replace]]
    field = "total"
    dest = "mem_total"

[[processors.rename]]
  namepass = ["processes"]
  [[processors.rename.replace]]
    field = "total"
    dest = "proc_total"

[[processors.converter]]
  namepass = ["gpu_process_metrics", "tcp_top"]
  [processors.converter.tags]
    string = ["gpu_idx", "pid", "process_name", "comm", "laddr", "lport", "raddr", "dport"]

[[aggregators.merge]]
  drop_original = true