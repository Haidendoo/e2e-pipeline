version: "1.0"

connections:
  # PostgreSQL Connection (used as Airflow metadata database)
  postgres_default:
    conn_type: postgres
    host: postgres
    port: 5432
    login: airflow
    password: airflow
    schema: airflow
    description: "PostgreSQL connection for Airflow metadata"

  # MinIO/S3 Compatible Storage Connection
  minio_conn:
    conn_type: aws
    login: minioadmin
    password: minioadmin
    host: minio
    port: 9000
    schema: s3
    extra:
      aws_access_key_id: minioadmin
      aws_secret_access_key: minioadmin
      host_bucket: "minio:9000"
      endpoint_url: "http://minio:9000"
      addressing_style: path
    description: "MinIO S3-compatible storage connection"

  # MinIO Connection (Alternative format)
  minio_remote:
    conn_type: aws
    login: minioadmin
    password: minioadmin
    extra:
      endpoint_url: "http://minio:9000"
      addressing_style: "path"
    description: "MinIO S3 remote connection"

  # Spark Connection
  spark_default:
    conn_type: spark
    host: spark-master
    port: 7077
    schema: spark
    extra:
      deploy_mode: "cluster"
      spark_binary: "/opt/spark/bin/spark-submit"
    description: "Spark Master node connection"

  # Spark Submit Connection (for submitting jobs)
  spark_submit:
    conn_type: spark
    host: spark-master
    port: 7077
    schema: spark
    extra:
      spark_home: "/opt/spark"
      master_url: "spark://spark-master:7077"
    description: "Spark Submit connection for job execution"

  # Kafka Connection (Internal cluster communication)
  kafka_default:
    conn_type: kafka
    host: kafka
    port: 9092
    schema: kafka
    extra:
      bootstrap_servers: "kafka:9092"
      group_id: "airflow-group"
    description: "Kafka broker connection (internal)"

  # Kafka External Connection (if accessing from outside containers)
  kafka_external:
    conn_type: kafka
    host: localhost
    port: 9094
    schema: kafka
    extra:
      bootstrap_servers: "localhost:9094"
      group_id: "airflow-group"
    description: "Kafka broker connection (external)"

  # HTTP Connection (for general API calls)
  http_default:
    conn_type: http
    host: "http://localhost"
    description: "Default HTTP connection"

  # EdgeX Core Data HTTP Connection
  edgex_core_data:
    conn_type: http
    host: "http://localhost"
    port: 59880
    schema: http
    description: "EdgeX core-data API (readings endpoint)"

  # EdgeX Core Metadata HTTP Connection
  edgex_core_metadata:
    conn_type: http
    host: "http://localhost"
    port: 59881
    schema: http
    description: "EdgeX core-metadata API (device/profile registration)"

  # EdgeX device-rest (REST device service)
  edgex_device_rest:
    conn_type: http
    host: "http://localhost"
    port: 59986
    schema: http
    description: "EdgeX device-rest service (data push endpoint)"


variables:
  # MinIO endpoints and buckets
  minio_endpoint: "http://minio:9000"
  minio_internal_endpoint: "minio:9000"
  minio_access_key: "minioadmin"
  minio_secret_key: "minioadmin"
  
  # MinIO Buckets
  minio_raw_data_bucket: "raw-data"
  minio_delta_lake_bucket: "delta-lake"
  minio_processed_data_bucket: "processed-data"
  
  # Spark Configuration
  spark_master_url: "spark://spark-master:7077"
  spark_home: "/opt/spark"
  
  # Kafka Configuration
  kafka_bootstrap_servers_internal: "kafka:9092"
  kafka_bootstrap_servers_external: "localhost:9094"
  
  # PostgreSQL Configuration
  postgres_host: "postgres"
  postgres_port: "5432"
  postgres_user: "airflow"
  postgres_database: "airflow"

  # ─── EdgeX Foundry Configuration ──────────────────────────────────────────
  # Kafka topic nhận dữ liệu từ EdgeX App Service (qua MQTT-Kafka bridge)
  edgex_kafka_topic: "edgex_system_metrics"

  # EdgeX API endpoints (host-side, khi Airflow cần gọi trực tiếp)
  edgex_core_data_url: "http://localhost:59880/api/v3"
  edgex_core_metadata_url: "http://localhost:59881/api/v3"
  edgex_device_rest_url: "http://localhost:59986/api/v3"

  # Device info
  edgex_device_name: "RPi4-REST-v2"
  edgex_profile_name: "RPi-REST-Profile-v2"

  # Kafka bootstrap cho EdgeX Spark jobs
  edgex_kafka_bootstrap_internal: "kafka:9092"
  edgex_kafka_bootstrap_external: "localhost:9094"

  # MinIO bucket cho EdgeX data
  edgex_minio_bucket: "test-bucket"
