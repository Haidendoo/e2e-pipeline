apiVersion: 1

datasources:
  - name: InfluxDB_v2
    uid: influxdb_ds
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: iceberg
      defaultBucket: kafka_events
      tlsSkipVerify: true
    secureJsonData:
      token: iceberg-token
    isDefault: true
    editable: true
