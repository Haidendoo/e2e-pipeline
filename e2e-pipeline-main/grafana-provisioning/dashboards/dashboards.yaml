apiVersion: 1
providers:
  - name: EdgeX System Monitoring
    orgId: 1
    folder: EdgeX
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
