  # ─── EdgeX App Service: Kafka Export ───────────────────────────────────────────
  # Subscribe EdgeX internal MessageBus, filter events, forward ra Kafka (E2E pipeline)
  app-service-kafka-export:
    image: edgexfoundry/app-service-configurable:4.0.1
    container_name: edgex-app-kafka-export
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
      - --overwrite
    depends_on:
      core-common-config-bootstrapper:
        condition: service_started
        required: true
      core-data:
        condition: service_started
        required: true
      core-keeper:
        condition: service_started
        required: true
      core-metadata:
        condition: service_started
        required: true
    environment:
      EDGEX_PROFILE: mqtt-export
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: edgex-app-kafka-export
      SERVICE_PORT: "59702"
      # Bật lại Registry (Keeper) nhưng với profile mới (mqtt-export)
      EDGEX_ADD_REGISTRY_UPDATES: "true"
      # Subscribe toàn bộ device events từ MessageBus
      TRIGGER_EDGEXMESSAGEBUS_SUBSCRIBEHOST_HOST: edgex-mqtt-broker
      TRIGGER_EDGEXMESSAGEBUS_SUBSCRIBEHOST_PORT: "1883"
      TRIGGER_EDGEXMESSAGEBUS_SUBSCRIBEHOST_PROTOCOL: tcp
      # Cấu hình Pipeline cho MQTT Export
      WRITABLE_PIPELINE_EXECUTIONORDER: FilterByDeviceName,Transform,MQTTExport
      WRITABLE_PIPELINE_FUNCTIONS_FILTERBYDEVICENAME_PARAMETERS_DEVICENAMES: "Telegraf-Node-01"
      WRITABLE_PIPELINE_FUNCTIONS_TRANSFORM_PARAMETERS_TYPE: json
      # Cấu hình MQTT Broker dùng chung
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_BROKERADDRESS: tcp://edgex-mqtt-broker:1883
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_TOPIC: edgex_system_metrics_raw
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_CLIENTID: app-kafka-export-client
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_RETAIN: "false"
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_AUTORECONNECT: "true"
    hostname: edgex-app-kafka-export
    networks:
      edgex-network: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 59702
        published: "59702"
        protocol: tcp
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 2002:2001
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: true

  # ─── MQTT-to-Kafka Bridge ────────────────────────────────────────────────────
  # Đọc MQTT topic edgex_system_metrics_raw từ EdgeX broker
  # và forward vào Kafka topic edgex_system_metrics của E2E pipeline
  mqtt-kafka-bridge:
    image: python:3.11-slim
    container_name: edgex-mqtt-kafka-bridge
    depends_on:
      mqtt-broker:
        condition: service_started
        required: true
    environment:
      MQTT_BROKER_HOST: edgex-mqtt-broker
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: edgex_system_metrics_raw
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: edgex_system_metrics
      BRIDGE_CLIENT_ID: edgex-mqtt-kafka-bridge
    command: >-
      bash -c "
        pip install paho-mqtt kafka-python-ng --quiet &&
        python /bridge/mqtt_to_kafka_bridge.py
      "
    volumes:
      - type: bind
        source: ./scripts
        target: /bridge
        read_only: true
    hostname: edgex-mqtt-kafka-bridge
    networks:
      - edgex-network
      - e2e-pipeline-main_default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ─── Init: Auto-register Device Profile + Device ─────────────────────────────
  edgex-init-registration:
    image: python:3.11-slim
    container_name: edgex-init-registration
    depends_on:
      core-metadata:
        condition: service_started
        required: true
    environment:
      EDGEX_METADATA_HOST: edgex-core-metadata
      EDGEX_METADATA_PORT: "59881"
      EDGEX_DEVICE_ADDRESS: "${EDGEX_DEVICE_ADDRESS:-192.168.1.6}"
      EDGEX_DEVICE_PORT: "${EDGEX_DEVICE_PORT:-59986}"
    command: >-
      bash -c "
        pip install requests --quiet &&
        python /scripts/register_profile_and_device.py --wait --timeout 120
      "
    volumes:
      - type: bind
        source: ./scripts
        target: /scripts
        read_only: true
      - type: bind
        source: ./config
        target: /scripts/../config
        read_only: true
    networks:
      - edgex-network
    restart: "no"

networks:
  edgex-network:
