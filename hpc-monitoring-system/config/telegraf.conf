[agent]
  interval = "5s"
  flush_interval = "5s"

[[outputs.http]]
  url = "http://localhost:8085"
  method = "POST"
  data_format = "json"
  [outputs.http.headers]
    Content-Type = "application/json"

# -------------------------------------------------------------------
# INPUTS (for running directly on WSL Linux)
# -------------------------------------------------------------------
[[inputs.cpu]]
  totalcpu = true

[[inputs.mem]]

[[inputs.diskio]]
  # Scan every Linux (WSL) disk

[[inputs.system]]

[[inputs.net]]

# Collect NVIDIA GPU stats (WSL supports running nvidia-smi)
[[inputs.nvidia_smi]]
  fieldpass = ["temperature_gpu", "utilization_gpu", "utilization_memory", "memory_used", "memory_free", "memory_reserved", "memory_total", "fan_speed"]

# pmon is disabled because WSL does not support it (it hangs until the timeout)
