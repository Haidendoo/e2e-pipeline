#   commands = ["sudo /usr/bin/python3 /opt/telegraf-scripts/tcptop.py 5 1"]
#   name_override = "tcp_top"
#   data_format = "influx"

# -------------------------------------------------------------------
# PROCESSORS & AGGREGATORS
# -------------------------------------------------------------------
[[processors.rename]]
  namepass = ["mem"]
  [[processors.rename.replace]]
    field = "total"
    dest = "mem_total"

[[processors.rename]]
  namepass = ["processes"]
  [[processors.rename.replace]]
    field = "total"
    dest = "proc_total"

[[processors.converter]]
  namepass = ["gpu_process_metrics"]
  [processors.converter.tags]
    string = ["gpu_idx", "pid", "process_name"]

[[aggregators.merge]]
  drop_original = true