version: '3.8'

services:
  # 1. Bridge container: receives JSON from Telegraf, flattens it, then forwards it to EdgeX
  telegraf-bridge:
    image: python:3.9-slim
    container_name: telegraf-bridge
    ports:
      - "8085:8080"
    volumes:
      - ./script/json_flattener.py:/app/json_flattener.py
    command: python3 -u /app/json_flattener.py
    environment:
      - DEVICE_NAME=Telegraf-Node-01
    extra_hosts:
      - "host.docker.internal:host-gateway"

  telegraf-edge:
    build: .   # build from the Dockerfile in this directory
    image: custom-telegraf:latest
    container_name: telegraf-edge
    
    # Run the container with full root privileges (--privileged)
    privileged: true
    
    # Share the host's process namespace (--pid=host)
    pid: "host"
    
    # Mount the kernel directories the tcp_top (eBPF) script needs to work
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      # The config and script are mounted from the host, so you can edit the Python
      # code or the Telegraf config without rebuilding the image.
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./script/tcptop.py:/opt/telegraf-scripts/tcptop.py:ro
    
    # The NVIDIA GPU requirement is disabled so this can run on WSL without a GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, utility]